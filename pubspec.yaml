name: qadr
description: "Qadr — Muslim companion app with conversational UI"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Local database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  sqlite3: ^2.0.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Prayer times (offline)
  adhan_dart: ^1.1.0

  # Geolocation
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Sensors (Qibla compass)
  flutter_compass: ^0.8.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Preferences
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Home screen widget
  home_widget: ^0.9.1

  # Haptics
  vibration: ^2.0.1

  # UI
  flutter_markdown: ^0.7.6
  google_fonts: ^6.2.1

  # Localization
  intl: ^0.20.2

  # Permissions
  permission_handler: ^11.3.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/data/
    - google_fonts/

  fonts:
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/general_sans/GeneralSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/general_sans/GeneralSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/general_sans/GeneralSans-Semibold.ttf
          weight: 600

