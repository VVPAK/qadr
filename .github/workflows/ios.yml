name: iOS

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.code }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'lib/**'
              - 'ios/**'
              - 'integration_test/**'
              - 'assets/**'
              - 'google_fonts/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - '.github/workflows/ios.yml'

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.code != 'true'
        run: echo "No code changes — iOS build skipped."

      - uses: subosito/flutter-action@v2
        if: steps.changes.outputs.code == 'true'
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Cache CocoaPods
        if: steps.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: flutter pub get

      - name: Install CocoaPods
        if: steps.changes.outputs.code == 'true'
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS for simulator
        if: steps.changes.outputs.code == 'true'
        run: flutter build ios --debug --simulator

      - name: Upload Runner.app
        if: steps.changes.outputs.code == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios/iphonesimulator/Runner.app
          retention-days: 1

  integration-test:
    runs-on: macos-latest
    needs: build
    if: needs.build.outputs.has_changes == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download Runner.app
        uses: actions/download-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios/iphonesimulator/Runner.app

      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -E "iPhone [0-9]" | tail -1 | grep -oE "[0-9A-F-]{36}")
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID" || true
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Install app on simulator
        run: xcrun simctl install "$SIM_UDID" build/ios/iphonesimulator/Runner.app

      - name: Run integration tests
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/onboarding_test.dart \
            -d "$SIM_UDID" \
            --use-application-binary=build/ios/iphonesimulator/Runner.app
