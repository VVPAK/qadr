name: Generated files

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-generated:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'lib/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'l10n.yaml'
              - '.github/workflows/generated.yml'

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.code != 'true'
        run: echo "No code changes — generated files check skipped."

      - uses: subosito/flutter-action@v2
        if: steps.changes.outputs.code == 'true'
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: flutter pub get

      - name: Run build_runner
        if: steps.changes.outputs.code == 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate l10n
        if: steps.changes.outputs.code == 'true'
        run: flutter gen-l10n

      - name: Check for uncommitted generated files
        if: steps.changes.outputs.code == 'true'
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "Generated files are out of date. Run the following locally and commit:"
            echo "  dart run build_runner build --delete-conflicting-outputs"
            echo "  flutter gen-l10n"
            exit 1
          fi
