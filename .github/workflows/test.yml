name: Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'lib/**'
              - 'test/**'
              - 'integration_test/**'
              - 'tool/**'
              - 'assets/**'
              - 'google_fonts/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
              - 'l10n.yaml'
              - '.github/workflows/test.yml'

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.code != 'true'
        run: echo "No code changes — tests skipped."

      - uses: subosito/flutter-action@v2
        if: steps.changes.outputs.code == 'true'
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.changes.outputs.code == 'true'
        run: flutter analyze --fatal-infos

      - name: Install lcov
        if: steps.changes.outputs.code == 'true'
        run: sudo apt-get install -y lcov

      - name: Run unit + widget tests
        if: steps.changes.outputs.code == 'true'
        run: flutter test --exclude-tags golden --coverage

      - name: Save unit coverage
        if: steps.changes.outputs.code == 'true'
        run: cp coverage/lcov.info coverage/lcov_unit.info

      - name: Run golden tests (coverage only, pixels not enforced on Linux)
        if: steps.changes.outputs.code == 'true'
        run: flutter test --tags golden --update-goldens --coverage

      - name: Merge coverage reports
        if: steps.changes.outputs.code == 'true'
        run: |
          lcov -a coverage/lcov_unit.info -a coverage/lcov.info \
            -o coverage/lcov_merged.info

      - name: Strip generated files from coverage
        if: steps.changes.outputs.code == 'true'
        run: |
          lcov --remove coverage/lcov_merged.info \
            '*/*.g.dart' \
            '*/*.freezed.dart' \
            '*/l10n/app_localizations_*.dart' \
            --ignore-errors unused \
            -o coverage/lcov_filtered.info

      - name: Check coverage threshold
        if: steps.changes.outputs.code == 'true'
        run: |
          SUMMARY=$(lcov --summary coverage/lcov_filtered.info 2>&1)
          echo "$SUMMARY"
          COVERAGE=$(echo "$SUMMARY" | grep -oP 'lines\.*: \K[\d.]+')
          echo "Line coverage: ${COVERAGE}%"
          python3 -c "
          cov = float('${COVERAGE}')
          threshold = 70
          if cov < threshold:
              print(f'FAIL: coverage {cov:.1f}% is below threshold {threshold}%')
              exit(1)
          print(f'OK: coverage {cov:.1f}% meets threshold {threshold}%')
          "
