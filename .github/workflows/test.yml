name: Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'lib/**'
              - 'test/**'
              - 'integration_test/**'
              - 'tool/**'
              - 'assets/**'
              - 'google_fonts/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
              - 'l10n.yaml'
              - '.github/workflows/test.yml'

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.code != 'true'
        run: echo "No code changes — tests skipped."

      - uses: subosito/flutter-action@v2
        if: steps.changes.outputs.code == 'true'
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.changes.outputs.code == 'true'
        run: flutter analyze --fatal-infos

      - name: Run tests
        if: steps.changes.outputs.code == 'true'
        run: flutter test --exclude-tags golden --coverage

      - name: Install lcov
        if: steps.changes.outputs.code == 'true'
        run: sudo apt-get install -y lcov

      - name: Check coverage threshold
        if: steps.changes.outputs.code == 'true'
        run: |
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          echo "$SUMMARY"
          COVERAGE=$(echo "$SUMMARY" | grep -oP 'lines\.*: \K[\d.]+')
          echo "Line coverage: ${COVERAGE}%"
          python3 -c "
          cov = float('${COVERAGE}')
          threshold = 60
          if cov < threshold:
              print(f'FAIL: coverage {cov:.1f}% is below threshold {threshold}%')
              exit(1)
          print(f'OK: coverage {cov:.1f}% meets threshold {threshold}%')
          "

      - name: Run golden tests
        if: steps.changes.outputs.code == 'true'
        run: flutter test --tags golden --update-goldens
        continue-on-error: true
